:root{
  --ink:#161619; --paper:#F4F3F0; --card:#FFFFFF;
  --muted:#6B6B72; --line:rgba(20,20,25,.10); --line-soft:rgba(20,20,25,.06);
  --red:#E8172B;
  --brand:'KRAFTON SANS','Pretendard',sans-serif;
  --body:'Pretendard','KRAFTON SANS',sans-serif;
  --maxw:1120px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none}
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 24px}

header{position:sticky;top:0;z-index:50;background:rgba(244,243,240,.86);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
.bar{display:flex;align-items:center;justify-content:flex-end;height:60px}
.logo{display:flex;align-items:baseline;gap:10px}
.logo b{font-family:var(--brand);font-weight:900;font-size:20px;letter-spacing:.01em}
.logo span{font-family:var(--brand);font-weight:500;font-size:11px;letter-spacing:.22em;color:var(--muted);text-transform:uppercase}
.langtoggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;font-family:var(--brand);font-size:12px;font-weight:500}
.langtoggle button{border:0;background:transparent;color:var(--muted);padding:5px 12px;cursor:pointer;font:inherit;transition:.15s}
.langtoggle button.on{background:var(--ink);color:#fff}

.hero{padding:72px 0 40px;border-bottom:1px solid var(--line)}
.eyebrow{font-family:var(--brand);font-weight:700;font-size:12px;letter-spacing:.24em;color:var(--red);text-transform:uppercase;margin-bottom:22px}
.hero h1{font-family:var(--brand);font-weight:900;font-size:clamp(36px,7vw,68px);line-height:1.02;letter-spacing:0;display:inline-flex;align-items:center;gap:.32em;flex-wrap:wrap}
.hero h1 .wordmark{color:var(--red);letter-spacing:-.01em}
.hero h1 .wordmark-logo{height:1.02em;width:auto;flex:0 0 auto}
.hero h1 .suffix{letter-spacing:-.01em}
.hero h1 .ko{font-family:var(--body);font-weight:700;letter-spacing:-.02em}
.hero p{margin-top:20px;font-size:16px;color:var(--muted);max-width:52ch}
.hero .meta{margin-top:28px;display:flex;align-items:baseline;gap:10px;font-family:var(--brand)}
.hero .meta .num{font-weight:900;font-size:40px;line-height:1}
.hero .meta .lbl{font-size:13px;color:var(--muted)}

.filterwrap{position:sticky;top:60px;z-index:40;background:rgba(244,243,240,.86);backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line)}
.filter{display:flex;gap:8px;overflow-x:auto;padding:14px 0;scrollbar-width:none}
.filter::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1px solid var(--line);background:transparent;border-radius:999px;padding:7px 15px;font-family:var(--brand);font-weight:500;font-size:12.5px;letter-spacing:.04em;color:var(--muted);cursor:pointer;transition:.15s;white-space:nowrap}
.chip:hover{border-color:var(--ink);color:var(--ink)}
.chip.on{background:var(--ink);color:#fff;border-color:var(--ink)}

.cat{padding:60px 0 8px}
.cat-head{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-bottom:16px;margin-bottom:20px}
.cat-title{display:flex;align-items:center;gap:12px}
.ic{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;flex:0 0 auto}
.ic svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.cat-title .en{font-family:var(--brand);font-weight:900;font-size:clamp(22px,3.6vw,32px);line-height:1}
.cat-title .cnt{font-family:var(--brand);font-weight:700;font-size:13px;color:var(--muted)}
.cat-nav{display:flex;gap:8px}
.navbtn{width:36px;height:36px;border-radius:50%;border:1px solid var(--line);background:#fff;color:var(--ink);cursor:pointer;font-size:17px;line-height:1;display:grid;place-items:center;transition:.15s}
.navbtn:hover{border-color:var(--ink)}
.navbtn:disabled{opacity:.3;cursor:default;border-color:var(--line)}

.rail{display:flex;gap:16px;overflow-x:auto;scroll-snap-type:x proximity;scroll-behavior:smooth;padding:2px 2px 10px;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.rail .card{flex:0 0 300px;scroll-snap-align:start}
.card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:26px 28px 28px;display:flex;flex-direction:column;gap:14px;cursor:pointer;position:relative;transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease;box-shadow:0 1px 2px rgba(20,20,25,.03)}
.card:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(20,20,25,.10);border-color:rgba(20,20,25,.16)}
.card .top{display:flex;align-items:center;gap:8px;font-family:var(--brand);font-size:11px;letter-spacing:.07em;color:var(--muted)}
.card .top .tag{font-weight:700;color:var(--red)}
.card .top .dot{width:3px;height:3px;border-radius:50%;background:var(--line)}
.card .labels{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto}
.card .chip{font-family:var(--body);font-size:11.5px;font-weight:600;letter-spacing:0;line-height:1;padding:5px 10px;border-radius:999px;background:rgba(20,20,25,.05);color:var(--muted);white-space:nowrap}
.card .chip.key{background:var(--chip-tint);color:var(--chip-col)}
.cat.featured .card .labels{margin-top:10px}
.card h3{font-size:22px;font-weight:700;line-height:1.3;letter-spacing:-.02em;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;min-height:2.6em}
.card .sum{font-size:14px;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.card .go{position:absolute;top:24px;right:24px;color:var(--red);opacity:0;transform:translateX(-4px);transition:opacity .18s ease,transform .18s ease}
.card:hover .go{opacity:1;transform:none}
.card .go svg{width:16px;height:16px;display:block}
.card .pick{position:absolute;top:20px;right:22px;color:#F0A500}
.card .pick svg{width:16px;height:16px;display:block;fill:currentColor;stroke:none}
.cat.featured{background:linear-gradient(180deg,rgba(232,23,43,.05),rgba(232,23,43,0) 72%);border:1px solid rgba(232,23,43,.13);border-radius:24px;padding:34px 28px 42px;margin:44px 0 30px}
.cat.featured .cat-head{padding-bottom:4px;margin-bottom:18px}
.cat.featured .rail .card{flex:0 0 336px;min-height:196px}
.card.fcard{padding:30px 30px 32px;box-shadow:0 2px 12px rgba(20,20,25,.06)}
.card.fcard .rank{position:absolute;top:14px;right:20px;font-family:var(--brand);font-weight:900;font-size:42px;line-height:1;color:rgba(232,23,43,.16);pointer-events:none}
.card.fcard .top{padding-right:46px}
.card.fcard .rank{top:12px;right:22px;font-size:38px}
.card.fcard .go{top:auto;bottom:24px;right:24px}
.card .views{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--muted);font-family:var(--brand);font-weight:600}
.card .views svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}

.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:900px){.grid3{grid-template-columns:repeat(2,1fr)}}
.pager{display:flex;gap:6px;justify-content:center;align-items:center;margin:30px 0 6px}
.pager button{min-width:36px;height:36px;padding:0 10px;border-radius:10px;border:1px solid var(--line);background:#fff;color:var(--ink);font-family:var(--brand);font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
.pager button:hover:not(:disabled){border-color:var(--ink)}
.pager button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.pager button:disabled{opacity:.35;cursor:default}

.months{padding:64px 0 8px}
.months h4{font-family:var(--brand);font-weight:900;font-size:14px;letter-spacing:.02em;margin-bottom:16px}
.months .list{display:flex;flex-wrap:wrap;gap:8px}
.months a{display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;padding:10px 14px;font-size:12.5px;background:#fff;transition:.15s;color:var(--ink)}
.months a:hover{border-color:var(--ink);transform:translateY(-1px)}
.months a b{font-family:var(--brand);font-weight:800}
.months a .d{color:var(--muted)}
.months a.all{border-style:dashed;color:var(--muted)}

footer{margin-top:72px;border-top:1px solid var(--line);padding:34px 0 60px}
.foot{display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;font-family:var(--brand);font-size:12px;letter-spacing:.03em;color:var(--muted)}
.foot b{font-weight:900;color:var(--ink);font-size:15px}
.foot .foot-logo-img{height:18px;width:auto;display:block}
.admin-open{cursor:pointer}

.admin{display:none;background:#0F0F12;color:#EDEDED;padding:28px 0 40px;margin-top:40px}
.admin.show{display:block}
.admin h2{font-family:var(--brand);font-weight:900;font-size:20px;margin-bottom:4px}
.admin .status{font-size:12px;color:#9a9aa2;margin-bottom:16px}
.admin .tools{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:18px}
.admin button.act{font-family:var(--brand);font-weight:700;font-size:12px;border:1px solid #3a3a40;background:#1c1c22;color:#EDEDED;padding:8px 14px;border-radius:8px;cursor:pointer}
.admin button.act.red{background:var(--red);border-color:var(--red);color:#fff}
.admin .row{display:grid;grid-template-columns:96px 42px 60px 1fr 1fr 56px;gap:8px;align-items:center;padding:8px 0;border-top:1px solid #26262c;font-size:12px}
.admin .row input[type=checkbox]{width:16px;height:16px;accent-color:var(--red)}
.admin .row.head{color:#8a8a92;font-family:var(--brand);font-weight:700;border-top:0}
.admin input,.admin select{background:#1c1c22;border:1px solid #33333a;color:#EDEDED;border-radius:6px;padding:6px 7px;font:inherit;font-size:12px;width:100%}
.admin .pv{font-family:var(--brand);font-weight:700;text-align:right}
.admin .del{cursor:pointer;color:#c66}
.admin .total{font-family:var(--brand);font-weight:900;font-size:14px;color:#fff;margin-right:6px}
.admin .note{font-size:11px;color:#8a8a92;margin-top:12px;line-height:1.7}

function railSection(o,items,auto,ranked){
  const sec=document.createElement("section"); sec.className="cat"+(ranked?" featured":"");
  sec.innerHTML=headHTML(o,items.length,true)+'<div class="rail"></div>';
  const rail=sec.querySelector(".rail");
  function buildCard(p,idx){
    var card=cardEl(p);
    if(ranked){
      card.classList.add("fcard");
      var rk=document.createElement("span"); rk.className="rank"; rk.textContent=String(idx+1); card.appendChild(rk);
    }
    return card;
  }
  const loop = !!(ranked && auto && items.length>1);
  items.forEach(function(p,idx){ rail.appendChild(buildCard(p,idx)); });
  if(loop){ items.forEach(function(p,idx){ rail.appendChild(buildCard(p,idx)); }); }
  const prev=sec.querySelector(".prev"), next=sec.querySelector(".next");
  const step=function(){return Math.max(rail.clientWidth*0.85,260);};
  const sync=function(){const max=rail.scrollWidth-rail.clientWidth-2;prev.disabled=rail.scrollLeft<=2;next.disabled=!loop&&rail.scrollLeft>=max;};
  prev.onclick=function(){rail.scrollBy({left:-step(),behavior:"smooth"});};
  next.onclick=function(){rail.scrollBy({left:step(),behavior:"smooth"});};
  rail.addEventListener("scroll",sync);
  requestAnimationFrame(sync);
  if(auto && items.length>1 && !(window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches)){
    var paused=false;
    rail.addEventListener("mouseenter",function(){paused=true;});
    rail.addEventListener("mouseleave",function(){paused=false;});
    var tid=setInterval(function(){
      if(paused) return;
      var card=rail.querySelector(".card"); var cw=(card?card.offsetWidth:300)+16;
      rail.scrollBy({left:cw,behavior:"smooth"});
      setTimeout(function(){
        if(loop){
          var setW=rail.scrollWidth/2;
          if(rail.scrollLeft>=setW-1){
            var pb=rail.style.scrollBehavior; rail.style.scrollBehavior="auto";
            rail.scrollLeft=rail.scrollLeft-setW;
            rail.style.scrollBehavior=pb;
          }
        } else {
          var max=rail.scrollWidth-rail.clientWidth-2;
          if(rail.scrollLeft>=max-1) rail.scrollTo({left:0,behavior:"smooth"});
        }
        sync();
      },500);
    },3500);
    AUTO_TIMERS.push(tid);
  }
  return sec;
}

function trackClick(p){
  const id=p.id||p.url||p.kt; p.clicks=(p.clicks||0)+1;
  if(!CONFIG.ENDPOINT) return;
  try{
    const body=JSON.stringify({action:"click",id:id});
    if(navigator.sendBeacon){navigator.sendBeacon(CONFIG.ENDPOINT,body);}
    else{fetch(CONFIG.ENDPOINT,{method:"POST",body:body,keepalive:true});}
  }catch(e){}
}

  const total=DATA.reduce((s,p)=>s+(Number(p.clicks)||0),0);
  document.getElementById("admin-total").textContent="총 PV "+total.toLocaleString();
  let html='<div class="row head"><span>카테고리</span><span>Vol</span><span>날짜</span><span>제목(KO)</span><span>URL/ID</span><span>PV</span></div>';
  DATA.forEach(function(p,i){
    html+='<div class="row">'
      +'<input value="'+esc(p.k)+'" onchange="edit('+i+',\'k\',this.value)" title="여러 개면 쉼표: work,culture" placeholder="work,culture">'
      +'<input value="'+esc(p.vol)+'" onchange="edit('+i+',\'vol\',this.value)">'
      +'<input value="'+esc(p.date)+'" onchange="edit('+i+',\'date\',this.value)">'
      +'<input value="'+esc(p.kt)+'" onchange="edit('+i+',\'kt\',this.value)">'
      +'<input value="'+esc(p.url||p.id||"")+'" onchange="edit('+i+',\'idurl\',this.value)" placeholder="page id or URL">'
      +'<span class="pv">'+(Number(p.clicks)||0)+' <span class="del" title="삭제" onclick="delRow('+i+')">✕</span></span>'
      +'</div>';
  });
  document.getElementById("admin-table").innerHTML=html;
}
function edit(i,field,val){
  if(field==="idurl"){ if(/^https?:\/\//.test(val)){DATA[i].url=val;} else {DATA[i].id=val; delete DATA[i].url;} }
  else if(field==="vol"){ DATA[i].vol=Number(val)||val; }
  else if(field==="rec"){ DATA[i].rec=!!val; }
  else { DATA[i][field]=val; }
  render();
}
function addRow(){ DATA.unshift({k:"work",vol:"",date:"",kt:"새 글",ks:"",et:"",es:"",id:"",clicks:0}); render(); renderAdmin(); }
function delRow(i){ if(confirm("이 글을 삭제할까요?")){ DATA.splice(i,1); render(); renderAdmin(); } }
function copyJSON(){
  const clean=DATA.map(function(r){var o=Object.assign({},r);delete o.clicks;return o;});
  const txt="const SEED = "+JSON.stringify(clean,null,2)+";";
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(function(){alert("SEED 배열을 복사했습니다. index.html의 SEED에 붙여 넣으세요.");},function(){prompt("아래를 복사하세요:",txt);}); }
  else{ prompt("아래를 복사하세요:",txt); }
}
function saveToSheet(){
  if(!CONFIG.ENDPOINT){ alert("엔드포인트가 설정되지 않았습니다. Apps Script 웹앱 URL을 CONFIG.ENDPOINT에 넣어주세요."); return; }
  const clean=DATA.map(function(r){var o=Object.assign({},r);delete o.clicks;return o;});
  fetch(CONFIG.ENDPOINT,{method:"POST",body:JSON.stringify({action:"save",key:CONFIG.ADMIN_KEY,posts:clean})})
    .then(r=>r.json()).then(function(d){ alert(d&&d.ok?"시트에 저장했습니다.":"저장 실패: "+((d&&d.error)||"unknown")); })
    .catch(function(e){ alert("저장 중 오류: "+e); });
}

(function(){var qi=document.getElementById("q");if(qi)qi.addEventListener("input",function(){query=this.value.trim();tagFilter="";pageNum=1;toggleClear();render();});var cb=document.getElementById("clearq");if(cb)cb.onclick=function(){clearFilter();};})();
render();
loadData(false);
if(location.hash==="#admin") openAdmin();
</script>
